<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>To-do List</title>
  </head>
  <body>
    <main>
      <aside class="side-bar">
        <input type="checkbox" id="open-side-bar" />
        
        <label class="btn-menu" for="open-side-bar">
          <span class="hamburguer-icon">&#9776</span>
        </label>

        <div class="side-bar__content">
          <ul class="to-do-files"></ul>
        </div>
      </aside>

      <div class="to-do-view">
        <h1 class="to-do-title">TO-DO LIST</h1>

        <div class="wrapper-actions">
          <div class="tabs">
            <button id="filter-to-do" class="tab-button to-do">
              Pendentes
            </button>
            <button id="filter-completed" class="tab-button completed disabled">
              Concluídos
            </button>
          </div>

          <button id="add-task">
            <span class="icon">+</span>
            <span class="name">Adicionar Tarefa</span>
          </button>
        </div>

        <div class="wrapper-table">
          <table id="tasks" class="tasks-table">
            <colgroup>
              <col class="col-checkbox" />
              <col class="col-name" />
              <col class="col-tag" />
              <col class="col-trash" />
            </colgroup>

            <thead>
              <tr>
                <th>Status</th>
                <th>Nome</th>
                <th>Etiqueta</th>
                <th></th>
              </tr>
            </thead>

            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
