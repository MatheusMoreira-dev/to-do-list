<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
</head>
<body>
    <h1>TO-DO LIST</h1>

    <div class="filtros">
        <button>Todos</button>
        <button>Concluídos</button>
        <button>Pendentes</button>
    </div>

    <button id="add-row" class="add-row">Adicionar</button>

    <table id="tasks">
        <thead>
            <th>Status</th>
            <th>Nome</th>
            <th>Etiqueta</th>
        </thead>
        <tbody></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
